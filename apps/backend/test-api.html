<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>KVRAT.ai API Test</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    input, button {
      padding: 10px;
      width: 100%;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
    }

    button {
      background: #22c55e;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }

    pre {
      background: #1e293b;
      padding: 15px;
      margin-top: 20px;
      border-radius: 10px;
      white-space: pre-wrap;
    }
  </style>
</head>

<body>

<h2>🚀 KVRAT.ai API Tester</h2>

<input id="msg" placeholder="اكتب رسالتك هنا..." />

<button onclick="send()">Send</button>

<pre id="out">Response will appear here...</pre>

<script>
async function send() {
  const message = document.getElementById('msg').value;

  const res = await fetch('http://19.0.0.68:4000/ai/chat', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({ message })
  });

  const data = await res.json();

  document.getElementById('out').textContent =
    JSON.stringify(data, null, 2);
}
</script>

</body>
</html>
